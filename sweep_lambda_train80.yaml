program: RL/demo_single_trigger_grpo_as_feature_all_training.py
method: grid
metric:
  name: AD_GFPO-F_tt_overall
  goal: maximize
parameters:
  lambda_1:
    values: [0.0, 0.25, 0.5, 0.75, 1.0]
  lambda_3:
    values: [0.0, 0.25, 0.5, 0.75, 1.0]
command:
  - ${env}
  - python
  - ${program}
  - ${args}
  - "--run-ht"
  - "--save-models"
  - "--max-chunks"
  - "148"
  - "--run-adt"
